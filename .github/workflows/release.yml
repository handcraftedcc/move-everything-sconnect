name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get install -y jq ripgrep

      - name: Verify tag matches module version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MODULE_VERSION="$(jq -r '.version' src/module.json)"
          if [ "$TAG_VERSION" != "$MODULE_VERSION" ]; then
            echo "ERROR: tag version ($TAG_VERSION) does not match module.json version ($MODULE_VERSION)"
            exit 1
          fi

      - name: Verify release.json metadata
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          REL_VERSION="$(jq -r '.version' release.json)"
          EXPECTED_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${TAG_VERSION}/sconnect-module.tar.gz"
          REL_URL="$(jq -r '.download_url' release.json)"
          if [ "$REL_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: release.json version ($REL_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          if [ "$REL_URL" != "$EXPECTED_URL" ]; then
            echo "ERROR: release.json download_url ($REL_URL) does not match expected ($EXPECTED_URL)"
            exit 1
          fi
          bash tests/test_release_metadata.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build module
        run: |
          docker build -t module-builder -f scripts/Dockerfile .
          docker run --rm -v "$PWD:/build" -w /build module-builder ./scripts/build.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sconnect-module.tar.gz
